<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominancia 88</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  background:url("fondo.jpg.jpeg") center/cover fixed;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  z-index:-1;
}

h1{
  text-align:center;
  color:gold;
}

/* GRID PRINCIPAL */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:15px;
  padding:15px;
}

.card{
  background:rgba(0,0,0,.7);
  border:1px solid gold;
  border-radius:18px;
  padding:15px;
  box-shadow:0 0 20px rgba(255,215,0,.4);
}

/* PRONÓSTICO VIP */
.pred-wrap{
  position:relative;
  min-height:230px;
  border-radius:12px;
  overflow:hidden;
  background:rgba(0,0,0,.85);
  border:1px solid rgba(255,215,0,.5);
}

.pred-img{
  width:100%;
  border-radius:10px;
  display:block;
}

.bloqueado{
  filter:blur(18px);
  opacity:.08;
  pointer-events:none;
  user-select:none;
}

.desbloqueado{
  filter:none;
  opacity:1;
  pointer-events:auto;
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:10px;
  background:rgba(0,0,0,.78);
  border-radius:10px;
  text-align:center;
}

.lock-icon{
  font-size:42px;
}

/* RULETA */
.ruleta{
  width:210px;
  height:210px;
  border-radius:50%;
  margin:auto;
  border:6px solid gold;
  overflow:hidden;
  box-shadow:0 0 35px gold;
  position:relative;
}

.ruleta::after{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:35px;
  height:35px;
  transform:translate(-50%,-50%);
  background:gold;
  border-radius:50%;
  box-shadow:0 0 15px gold;
}

.ruleta-inner{
  width:100%;
  height:100%;
  border-radius:50%;
  transition:transform 4s cubic-bezier(.15,.85,.25,1);
  background:conic-gradient(
    gold 0deg 45deg,
    #111 45deg 90deg,
    #00ff99 90deg 135deg,
    #111 135deg 180deg,
    gold 180deg 225deg,
    #111 225deg 270deg,
    #ff00ff 270deg 315deg,
    #111 315deg 360deg
  );
}

.puntero{
  width:0;
  height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-top:25px solid red;
  margin:0 auto 5px auto;
}

/* CAJA */
.cajas{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.mystery-box{
  padding:25px;
  font-size:40px;
  background:#222;
  border:2px solid gold;
  border-radius:15px;
  cursor:pointer;
  margin:5px;
  transition:.3s;
}

.mystery-box:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px gold;
}

.mystery-box.bloqueadaCaja{
  opacity:.35;
  pointer-events:none;
  cursor:not-allowed;
}

/* BOTÓN */
button{
  padding:10px 15px;
  background:gold;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  transform:scale(1.03);
}

/* RESULTADO */
.resultado{
  margin-top:10px;
  color:#00ff99;
  font-weight:bold;
}

/* RESPONSIVE */
@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body onload="verificarCaja()">

<h1>🔥 DOMINANCIA 88 🔥</h1>

<div class="grid">

  <!-- PRONÓSTICO VIP -->
  <div class="card">
    <h3>📊 Pronóstico VIP</h3>

    <div class="pred-wrap">
      <img id="img" src="pronostico.jpg" class="pred-img bloqueado">

      <div id="lock" class="overlay">
        <div class="lock-icon">🔒</div>
        <p>Contenido VIP bloqueado</p>
        <button onclick="vip()">Desbloquear</button>
      </div>
    </div>
  </div>

  <!-- RULETA -->
  <div class="card">
    <h3>🎡 Ruleta</h3>

    <div class="puntero"></div>

    <div class="ruleta">
      <div id="ruleta" class="ruleta-inner"></div>
    </div>

    <br>
    <button onclick="girar()">Girar</button>
    <div id="resRuleta" class="resultado"></div>
  </div>

  <!-- TRIPLETAS -->
  <div class="card">
    <h3>🎯 Tripleta diaria</h3>
    <button onclick="tripleta()">Generar</button>
    <div id="resTripleta" class="resultado"></div>
  </div>

  <!-- CAJA MISTERIOSA -->
  <div class="card">
    <h3>🎁 Caja Misteriosa</h3>

    <div class="cajas">
      <div class="mystery-box" onclick="caja()">🎁</div>
      <div class="mystery-box" onclick="caja()">🎁</div>
    </div>

    <div id="resCaja" class="resultado"></div>
  </div>

  <!-- SISTEMA EN VIVO -->
  <div class="card">
    <h3>⚡ Sistema en vivo</h3>
    <div id="live"></div>
  </div>

</div>

<script>

/* CLAVE VIP */
const claveVIP = "8888";

/* VIP */
function vip(){
  let clave = prompt("Introduce la clave VIP:");

  if(clave === claveVIP){
    document.getElementById("img").classList.remove("bloqueado");
    document.getElementById("img").classList.add("desbloqueado");
    document.getElementById("lock").style.display = "none";
  }else{
    alert("Clave incorrecta");
  }
}

/* RULETA */
let gradosActuales = 0;

function girar(){
  let r = document.getElementById("ruleta");
  let resultado = document.getElementById("resRuleta");

  resultado.innerHTML = "🎡 Girando...";

  let giroExtra = 360 * 6 + Math.floor(Math.random() * 360);
  gradosActuales += giroExtra;

  r.style.transform = "rotate(" + gradosActuales + "deg)";

  setTimeout(()=>{
    let gana = Math.floor(Math.random() * 500) === 0;

    resultado.innerHTML = gana
      ? "🔥 CASI VIP"
      : "🔒 Sigue intentando";

  },4000);
}

/* CAJA MISTERIOSA — 1 INTENTO DIARIO */
function caja(){
  let hoy = new Date().toLocaleDateString();
  let fechaGuardada = localStorage.getItem("cajaFecha");
  let numeroGuardado = localStorage.getItem("cajaNumero");

  if(fechaGuardada === hoy){
    document.getElementById("resCaja").innerHTML =
      "⚠️ Ya usaste tu intento de hoy. Número: 🔥 " + numeroGuardado;
    bloquearCajas();
    return;
  }

  let n = Math.floor(Math.random() * 100).toString().padStart(2,"0");

  localStorage.setItem("cajaFecha", hoy);
  localStorage.setItem("cajaNumero", n);

  document.getElementById("resCaja").innerHTML = "🔥 " + n;

  bloquearCajas();
}

function verificarCaja(){
  let hoy = new Date().toLocaleDateString();
  let fechaGuardada = localStorage.getItem("cajaFecha");
  let numeroGuardado = localStorage.getItem("cajaNumero");

  if(fechaGuardada === hoy){
    document.getElementById("resCaja").innerHTML =
      "⚠️ Intento diario usado. Número: 🔥 " + numeroGuardado;
    bloquearCajas();
  }
}

function bloquearCajas(){
  let cajas = document.querySelectorAll(".mystery-box");

  cajas.forEach(caja=>{
    caja.classList.add("bloqueadaCaja");
  });
}

/* TRIPLETA */
function tripleta(){
  let hoy = new Date().toLocaleDateString();

  if(localStorage.getItem("trip") === hoy){
    document.getElementById("resTripleta").innerHTML = "⚠️ Ya usaste hoy";
    return;
  }

  let a = Math.floor(Math.random() * 100).toString().padStart(2,"0");
  let b = Math.floor(Math.random() * 100).toString().padStart(2,"0");
  let c = Math.floor(Math.random() * 100).toString().padStart(2,"0");

  let lot = ["Nacional","Leidsa","Loteka"];
  let l = lot[Math.floor(Math.random() * lot.length)];

  document.getElementById("resTripleta").innerHTML =
    `🔥 ${a}-${b}-${c} <br>${l}`;

  localStorage.setItem("trip", hoy);
}

/* SISTEMA EN VIVO */
let mensajes = [
  "🔥 Jugador ganó con 35",
  "📊 Sistema detectó patrón",
  "🎯 Nueva combinación activa",
  "⚡ Movimiento detectado",
  "💰 Premio entregado"
];

setInterval(()=>{
  let m = mensajes[Math.floor(Math.random() * mensajes.length)];
  document.getElementById("live").innerHTML = m;
},3000);

</script>

</body>
</html>
