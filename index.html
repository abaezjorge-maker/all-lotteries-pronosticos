<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominancia 88</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
color:white;
background:url("fondo.jpg.jpeg") center/cover fixed;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
z-index:-1;
}

/* GRID PRINCIPAL */
.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:rgba(0,0,0,.7);
border:1px solid gold;
border-radius:18px;
padding:15px;
box-shadow:0 0 20px rgba(255,215,0,.4);
}

/* PRONÓSTICO */
.pred-img{
width:100%;
border-radius:10px;
filter:blur(6px);
}
.desbloqueado{filter:blur(0)}

.overlay{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,.6);
border-radius:10px;
}

/* RULETA */
.ruleta{
width:200px;
height:200px;
border-radius:50%;
margin:auto;
border:5px solid gold;
overflow:hidden;
box-shadow:0 0 30px gold;
}
.ruleta-inner{
width:100%;
height:100%;
border-radius:50%;
transition:transform 4s;
background:conic-gradient(
gold 0 45deg,#111 45 90,#0f0 90 135,#111 135 180,
gold 180 225,#111 225 270,#f0f 270 315,#111 315 360
);
}

/* CAJA */
.mystery-box{
padding:25px;
font-size:40px;
background:#222;
border:2px solid gold;
border-radius:15px;
cursor:pointer;
margin:5px;
}

/* BOTÓN */
button{
padding:10px 15px;
background:gold;
border:none;
border-radius:10px;
cursor:pointer;
}

/* RESULTADO */
.resultado{
margin-top:10px;
color:#00ff99;
font-weight:bold;
}

/* RESPONSIVE */
@media(max-width:900px){
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<h1 style="text-align:center;color:gold">🔥 DOMINANCIA 88 🔥</h1>

<div class="grid">

<!-- IZQUIERDA: PRONÓSTICO -->
<div class="card">
<h3>📊 Pronóstico VIP</h3>
<div style="position:relative">
<img id="img" src="pronostico.jpg" class="pred-img">
<div id="lock" class="overlay">
<button onclick="vip()">Desbloquear</button>
</div>
</div>
</div>

<!-- CENTRO ARRIBA: RULETA -->
<div class="card">
<h3>🎡 Ruleta</h3>
<div class="ruleta">
<div id="ruleta" class="ruleta-inner"></div>
</div>
<br>
<button onclick="girar()">Girar</button>
<div id="resRuleta" class="resultado"></div>
</div>

<!-- DERECHA: TRIPLETAS -->
<div class="card">
<h3>🎯 Tripleta diaria</h3>
<button onclick="tripleta()">Generar</button>
<div id="resTripleta" class="resultado"></div>
</div>

<!-- CENTRO ABAJO: CAJA -->
<div class="card">
<h3>🎁 Caja Misteriosa</h3>
<div>
<div class="mystery-box" onclick="caja()">🎁</div>
<div class="mystery-box" onclick="caja()">🎁</div>
</div>
<div id="resCaja" class="resultado"></div>
</div>

<!-- EXTRA: SISTEMA EN VIVO -->
<div class="card">
<h3>⚡ Sistema en vivo</h3>
<div id="live"></div>
</div>

</div>

<script>

/* VIP */
function vip(){
document.getElementById("img").classList.add("desbloqueado");
document.getElementById("lock").style.display="none";
}

/* RULETA */
function girar(){
let r=document.getElementById("ruleta");
let giro=360*5+Math.random()*360;
r.style.transform="rotate("+giro+"deg)";
setTimeout(()=>{
let gana=Math.floor(Math.random()*500)==0;
document.getElementById("resRuleta").innerHTML=
gana?"🔥 CASI VIP":"🔒 Sigue intentando";
},4000);
}

/* CAJA */
function caja(){
let n=Math.floor(Math.random()*100);
document.getElementById("resCaja").innerHTML="🔥 "+n;
}

/* TRIPLETA */
function tripleta(){
let hoy=new Date().toDateString();
if(localStorage.getItem("trip")==hoy){
document.getElementById("resTripleta").innerHTML="⚠️ Ya usaste hoy";
return;
}
let a=Math.floor(Math.random()*100);
let b=Math.floor(Math.random()*100);
let c=Math.floor(Math.random()*100);
let lot=["Nacional","Leidsa","Loteka"];
let l=lot[Math.floor(Math.random()*lot.length)];

document.getElementById("resTripleta").innerHTML=
`🔥 ${a}-${b}-${c} <br>${l}`;

localStorage.setItem("trip",hoy);
}

/* SISTEMA EN VIVO */
let mensajes=[
"🔥 Jugador ganó con 35",
"📊 Sistema detectó patrón",
"🎯 Nueva combinación activa",
"⚡ Movimiento detectado",
"💰 Premio entregado"
];

setInterval(()=>{
let m=mensajes[Math.floor(Math.random()*mensajes.length)];
document.getElementById("live").innerHTML=m;
},3000);

</script>

</body>
</html>
