<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>All Lotteries</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
      border-bottom: 3px solid gold;
    }

    h1 {
      margin: 0;
      font-size: 40px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .num {
      background: gold;
      color: black;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px,1fr));
      gap: 10px;
    }

    .box {
      background: black;
      border: 1px solid gold;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>ALL LOTTERIES</h1>
  <p>Pronóstico automático del día siguiente</p>
</header>

<div id="app"></div>

<script>

/* ===== AQUI PEGAS TUS PRONOSTICOS ===== */

const pronosticos = {

  "2026-05-26": {
    titulo: "ADN PIRAMIDAL — 26 MAYO 2026",
    nota: "Sistema basado en supervivencia matemática y reversos activos.",

    quinielas: ["12","35","51","65","75","34","66","88","45","28","78","50","49","59","57","77","68","73","25","79","85"],

    pales: [
      "12-35","35-51",
      "65-75","75-34",
      "66-88","88-35",
      "45-28","28-78",
      "50-49","49-59",
      "57-77","77-49",
      "12-26","26-51",
      "68-73","73-25",
      "79-85","85-45"
    ],

    tripletas: [
      "12-35-51",
      "65-75-34",
      "66-88-35",
      "45-28-78",
      "50-49-59",
      "57-77-49",
      "12-26-51",
      "68-73-25",
      "79-85-45"
    ]
  }

};

/* ===== LOGICA AUTOMATICA ===== */

function manana() {
  let hoy = new Date();
  hoy.setDate(hoy.getDate()+1);
  return hoy.toISOString().split("T")[0];
}

function render(data, fecha) {

  document.getElementById("app").innerHTML = `

    <div class="card">
      <h2>${data.titulo}</h2>
      <p>${fecha}</p>
      <p>${data.nota}</p>
    </div>

    <div class="card">
      <h3>Quinielas</h3>
      <div class="numbers">
        ${data.quinielas.map(n=>`<div class="num">${n}</div>`).join("")}
      </div>
    </div>

    <div class="card">
      <h3>Palés</h3>
      <div class="grid">
        ${data.pales.map(n=>`<div class="box">${n}</div>`).join("")}
      </div>
    </div>

    <div class="card">
      <h3>Tripletas</h3>
      <div class="grid">
        ${data.tripletas.map(n=>`<div class="box">${n}</div>`).join("")}
      </div>
    </div>

  `;
}

function empty(fecha) {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>No hay pronóstico cargado</h2>
      <p>${fecha}</p>
    </div>
  `;
}

let f = manana();

if (pronosticos[f]) {
  render(pronosticos[f], f);
} else {
  empty(f);
}

</script>

</body>
</html>
