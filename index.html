<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominancia 88</title>

<style>
*{box-sizing:border-box}
body{
margin:0;font-family:Arial;color:white;text-align:center;padding-bottom:95px;
background:radial-gradient(circle at top left,rgba(255,215,0,.22),transparent 28%),
radial-gradient(circle at top right,rgba(0,255,180,.18),transparent 30%),
linear-gradient(135deg,#05080d,#071923,#102f3d);
overflow-x:hidden
}

header{
padding:25px;
border-bottom:2px solid gold;
background:rgba(0,0,0,.4)
}

h1{color:gold;font-size:40px}

.card{
background:rgba(255,255,255,.08);
margin:15px;
padding:20px;
border-radius:20px;
}

/* 🔥 CAJA 2x2 */
.mystery-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.mystery-box{
background:linear-gradient(135deg,#111,#443300);
border:2px solid gold;
border-radius:20px;
padding:30px;
font-size:50px;
cursor:pointer;
transition:.3s;
}

.mystery-box:hover{transform:scale(1.08)}

.abriendo{animation:shake .5s}
@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(5deg)}
50%{transform:rotate(-5deg)}
75%{transform:rotate(5deg)}
100%{transform:rotate(0)}
}

.resultado{margin-top:20px;font-size:24px;color:#00ff99}
.numero{font-size:50px;color:gold}

.contador{color:gold;margin-top:10px}
.historial{font-size:14px;margin-top:10px;opacity:.8}

/* BOTÓN FIJO */
.fijo{
position:fixed;
bottom:0;
left:0;
width:100%;
background:black;
padding:12px;
border-top:2px solid gold;
}

.fijo a{
background:#00ff88;
padding:15px 30px;
border-radius:15px;
color:white;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>🔥 DOMINANCIA 88 🔥</h1>
<p>Sistema ADN Piramidal</p>
</header>

<div class="card">
<h3>🎁 Caja Misteriosa</h3>
<p>1 intento diario — descubre tu jugada</p>

<div class="mystery-grid">
<div class="mystery-box" onclick="abrirCaja(this)">🎁</div>
<div class="mystery-box" onclick="abrirCaja(this)">🎁</div>
<div class="mystery-box" onclick="abrirCaja(this)">🎁</div>
<div class="mystery-box" onclick="abrirCaja(this)">🎁</div>
</div>

<div id="resultado" class="resultado"></div>
<div id="contador" class="contador"></div>
<div id="historial" class="historial"></div>

</div>

<script>
function abrirCaja(el){

let hoy=new Date().toDateString();

if(localStorage.getItem("intento")==hoy){
document.getElementById("resultado").innerHTML="⚠️ Ya usaste tu intento hoy";
return;
}

if(navigator.vibrate){navigator.vibrate(200);}
el.classList.add("abriendo");

setTimeout(()=>{

let numero=Math.floor(Math.random()*100).toString().padStart(2,"0");

let loterias=["Nacional","Leidsa","Real","Loteka"];
let loteria=loterias[Math.floor(Math.random()*loterias.length)];

let suerte=Math.random();

if(suerte<0.7){
document.getElementById("resultado").innerHTML=
`🔥 Jugada gratis:<br><span class="numero">${numero}</span><br>${loteria}`;
guardar(numero,loteria);
}else if(suerte<0.9){
document.getElementById("resultado").innerHTML=
"😲 CASI GANAS VIP...";
}else{
document.getElementById("resultado").innerHTML=
"🔒 ACCESO VIP BLOQUEADO";
ganador();
}

localStorage.setItem("intento",hoy);

},600);
}

function ganador(){
let g=localStorage.getItem("g")||100;
g++;
localStorage.setItem("g",g);
mostrar();
}

function mostrar(){
let g=localStorage.getItem("g")||100;
document.getElementById("contador").innerText=
"🔥 "+g+" usuarios desbloquearon VIP";
}

function guardar(n,l){
let h=JSON.parse(localStorage.getItem("h")||"[]");
h.unshift(n+" "+l);
h=h.slice(0,5);
localStorage.setItem("h",JSON.stringify(h));

document.getElementById("historial").innerHTML=
"Últimas:<br>"+h.join("<br>");
}

mostrar();
</script>

<div class="fijo">
<a href="#">🔥 VIP FIJO 🔥</a>
</div>

</body>
</html>
