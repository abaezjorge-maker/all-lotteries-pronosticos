<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominancia 88</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  background:url("fondo.jpg.jpeg") center/cover fixed;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  z-index:-1;
}

h1{
  text-align:center;
  color:gold;
  letter-spacing:2px;
}

/* ADMIN */
.admin-panel{
  text-align:center;
  margin:0 auto 10px auto;
}

.admin-panel button{
  margin:4px;
}

#estadoAdmin{
  margin-top:6px;
  font-size:14px;
}

/* GRID PRINCIPAL */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:15px;
  padding:15px;
}

.card{
  background:rgba(0,0,0,.7);
  border:1px solid gold;
  border-radius:18px;
  padding:15px;
  box-shadow:0 0 20px rgba(255,215,0,.4);
}

/* PRONÓSTICO VIP */
.pred-wrap{
  position:relative;
  min-height:230px;
  border-radius:12px;
  overflow:hidden;
  background:rgba(0,0,0,.85);
  border:1px solid rgba(255,215,0,.5);
}

.pred-img{
  width:100%;
  border-radius:10px;
  display:block;
}

.bloqueado{
  filter:blur(18px);
  opacity:.08;
  pointer-events:none;
  user-select:none;
}

.desbloqueado{
  filter:none;
  opacity:1;
  pointer-events:auto;
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:10px;
  background:rgba(0,0,0,.78);
  border-radius:10px;
  text-align:center;
  padding:15px;
}

.lock-icon{
  font-size:42px;
}

.vip-title{
  font-size:18px;
  margin:10px 0;
}

.vip-note{
  margin-top:18px;
  padding:14px 16px;
  max-width:420px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,215,0,0.35);
  border-radius:14px;
  text-align:center;
  color:#f5f5f5;
  line-height:1.5;
  box-shadow:0 0 12px rgba(255,215,0,0.12);
}

.vip-note h4{
  margin:0 0 8px 0;
  color:gold;
  font-size:16px;
}

.vip-note p{
  margin:6px 0;
  font-size:14px;
  color:#eaeaea;
}

.vip-note strong{
  color:#ffd700;
}

/* RULETA */
.ruleta{
  width:260px;
  height:260px;
  border-radius:50%;
  margin:auto;
  border:6px solid gold;
  overflow:hidden;
  box-shadow:0 0 35px gold;
  position:relative;
  background:#111;
}

.ruleta-inner{
  width:100%;
  height:100%;
  border-radius:50%;
  position:relative;
  transition:transform 4s cubic-bezier(.15,.85,.25,1);
  background:repeating-conic-gradient(
    #111 0deg 14.4deg,
    #f5d76e 14.4deg 28.8deg
  );
}

.centro-ruleta{
  position:absolute;
  width:38px;
  height:38px;
  border-radius:50%;
  background:gold;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
  box-shadow:0 0 15px gold;
}

.numero-ruleta{
  position:absolute;
  top:50%;
  left:50%;
  width:26px;
  height:26px;
  margin:-13px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:bold;
  color:white;
  text-shadow:0 0 5px black;
  z-index:5;
}

.puntero{
  width:0;
  height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-top:25px solid red;
  margin:0 auto 8px auto;
  filter:drop-shadow(0 0 8px red);
}

/* CAJA */
.cajas{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.mystery-box{
  padding:25px;
  font-size:40px;
  background:#222;
  border:2px solid gold;
  border-radius:15px;
  cursor:pointer;
  margin:5px;
  transition:.3s;
}

.mystery-box:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px gold;
}

.mystery-box.bloqueadaCaja{
  opacity:.35;
  pointer-events:none;
  cursor:not-allowed;
}

/* BOTÓN */
button{
  padding:10px 15px;
  background:gold;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  transform:scale(1.03);
}

/* RESULTADOS */
.resultado{
  margin-top:10px;
  color:#00ff99;
  font-weight:bold;
  line-height:1.5;
}

/* RESPONSIVE */
@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }

  .ruleta{
    width:230px;
    height:230px;
  }

  .vip-note{
    max-width:95%;
  }
}
</style>
</head>

<body onload="iniciarPagina()">

<h1>🔥 DOMINANCIA 88 🔥</h1>

<div class="admin-panel">
  <button onclick="activarAdmin()">🔐 Admin</button>
  <button onclick="salirAdmin()">Salir admin</button>
  <div id="estadoAdmin" class="resultado"></div>
</div>

<div class="grid">

  <!-- PRONÓSTICO VIP -->
  <div class="card">
    <h3>📊 Pronóstico VIP</h3>

    <div class="pred-wrap">
      <img id="img" src="pronostico.jpg" class="pred-img bloqueado">

      <div id="lock" class="overlay">
        <div class="lock-icon">🔒</div>
        <p class="vip-title">Contenido VIP bloqueado</p>
        <button onclick="vip()">Desbloquear</button>

        <div class="vip-note">
          <h4>Acceso VIP disponible</h4>
          <p>Para obtener tu clave VIP por <strong>1 semana</strong>, realiza un pago de <strong>RD$2,000</strong>.</p>
          <p>Para más información o activación, comunícate con el administrador.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- RULETA -->
  <div class="card">
    <h3>🎡 Ruleta</h3>

    <div class="puntero"></div>

    <div class="ruleta">
      <div id="ruleta" class="ruleta-inner">
        <div class="centro-ruleta"></div>
      </div>
    </div>

    <br>
    <button onclick="girar()">Girar</button>
    <div id="resRuleta" class="resultado"></div>
  </div>

  <!-- TRIPLETA DIARIA -->
  <div class="card">
    <h3>🎯 Tripleta diaria</h3>
    <button onclick="tripleta()">Generar</button>
    <div id="resTripleta" class="resultado"></div>
  </div>

  <!-- CAJA MISTERIOSA -->
  <div class="card">
    <h3>🎁 Caja Misteriosa</h3>

    <div class="cajas">
      <div class="mystery-box" onclick="caja()">🎁</div>
      <div class="mystery-box" onclick="caja()">🎁</div>
    </div>

    <div id="resCaja" class="resultado"></div>
  </div>

  <!-- SISTEMA EN VIVO -->
  <div class="card">
    <h3>⚡ Sistema en vivo</h3>
    <div id="live"></div>
  </div>

</div>

<script>

/* =========================
   CONFIGURACIÓN GENERAL
========================= */

const claveVIP = "3321";
const claveAdmin = "admin88";

const loterias = [
  "Nacional",
  "La Primera",
  "La Suerte",
  "Loteka",
  "Leidsa",
  "New York Tarde",
  "New York Noche",
  "Anguila",
  "Kino",
  "Super Kino"
];

function loteriaAleatoria(){
  return loterias[Math.floor(Math.random() * loterias.length)];
}

function fechaHoy(){
  return new Date().toLocaleDateString();
}

/* =========================
   MODO ADMINISTRADOR
========================= */

function esAdmin(){
  return localStorage.getItem("modoAdmin") === "activo";
}

function activarAdmin(){
  let clave = prompt("Introduce la clave de administrador:");

  if(clave === claveAdmin){
    localStorage.setItem("modoAdmin", "activo");
    alert("Modo administrador activado");

    actualizarEstadoAdmin();
    desbloquearCajas();
  }else{
    alert("Clave de administrador incorrecta");
  }
}

function salirAdmin(){
  localStorage.removeItem("modoAdmin");
  alert("Modo administrador desactivado");

  actualizarEstadoAdmin();
  verificarCaja();
  verificarRuleta();
  verificarTripleta();
}

function actualizarEstadoAdmin(){
  const estado = document.getElementById("estadoAdmin");

  if(!estado) return;

  if(esAdmin()){
    estado.innerHTML = "🟢 Modo administrador activo — intentos ilimitados";
    desbloquearCajas();
  }else{
    estado.innerHTML = "🔴 Modo visitante — límites diarios activos";
  }
}

/* =========================
   INICIO DE PÁGINA
========================= */

function iniciarPagina(){
  crearNumerosRuleta();
  verificarCaja();
  verificarRuleta();
  verificarTripleta();
  actualizarEstadoAdmin();
}

/* =========================
   VIP
========================= */

function vip(){
  let clave = prompt("Introduce la clave VIP:");

  if(clave === claveVIP || esAdmin()){
    document.getElementById("img").classList.remove("bloqueado");
    document.getElementById("img").classList.add("desbloqueado");
    document.getElementById("lock").style.display = "none";
  }else{
    alert("Clave incorrecta");
  }
}

/* =========================
   RULETA 1-25
   VISITANTE: 2 INTENTOS POR DÍA
   ADMIN: ILIMITADO
========================= */

let gradosActuales = 0;

function crearNumerosRuleta(){
  const ruleta = document.getElementById("ruleta");

  if(document.querySelector(".numero-ruleta")){
    return;
  }

  const total = 25;
  const angulo = 360 / total;
  const radio = 100;

  for(let i = 1; i <= total; i++){
    const num = document.createElement("div");
    num.className = "numero-ruleta";
    num.textContent = i;

    const rotacion = (i - 1) * angulo;

    num.style.transform =
      `rotate(${rotacion}deg) translateY(-${radio}px) rotate(-${rotacion}deg)`;

    ruleta.appendChild(num);
  }
}

function girar(){
  let hoy = fechaHoy();
  let intentos = Number(localStorage.getItem("ruletaIntentos_" + hoy)) || 0;
  let r = document.getElementById("ruleta");
  let resultado = document.getElementById("resRuleta");

  if(intentos >= 2 && !esAdmin()){
    let ultimoResultado = localStorage.getItem("ruletaUltimoResultado_" + hoy);

    resultado.innerHTML = ultimoResultado
      ? "⚠️ Ya usaste tus 2 intentos de hoy<br>" + ultimoResultado
      : "⚠️ Ya usaste tus 2 intentos de hoy";

    return;
  }

  resultado.innerHTML = esAdmin()
    ? "👑 Admin girando..."
    : "🎡 Girando...";

  let giroExtra = 360 * 6 + Math.floor(Math.random() * 360);
  gradosActuales += giroExtra;

  r.style.transform = "rotate(" + gradosActuales + "deg)";

  setTimeout(() => {
    let numero = Math.floor(Math.random() * 25) + 1;
    let loteria = loteriaAleatoria();

    let textoResultado = "";

    if(esAdmin()){
      textoResultado = `👑 Admin<br>🔥 ${numero} — ${loteria}<br>Intentos ilimitados`;
    }else{
      intentos++;
      localStorage.setItem("ruletaIntentos_" + hoy, intentos);

      textoResultado = `🔥 ${numero} — ${loteria}<br>Intento ${intentos}/2`;
      localStorage.setItem("ruletaUltimoResultado_" + hoy, textoResultado);
    }

    resultado.innerHTML = textoResultado;

  }, 4000);
}

function verificarRuleta(){
  let hoy = fechaHoy();
  let intentos = Number(localStorage.getItem("ruletaIntentos_" + hoy)) || 0;
  let ultimoResultado = localStorage.getItem("ruletaUltimoResultado_" + hoy);

  if(esAdmin()){
    document.getElementById("resRuleta").innerHTML =
      "👑 Admin activo: ruleta ilimitada";
    return;
  }

  if(intentos > 0 && ultimoResultado){
    document.getElementById("resRuleta").innerHTML =
      ultimoResultado + `<br>Usados: ${intentos}/2`;
  }
}

/* =========================
   CAJA MISTERIOSA
   VISITANTE: 1 INTENTO POR DÍA
   ADMIN: ILIMITADO
========================= */

function caja(){
  let hoy = fechaHoy();
  let fechaGuardada = localStorage.getItem("cajaFecha");
  let numeroGuardado = localStorage.getItem("cajaNumero");
  let loteriaGuardada = localStorage.getItem("cajaLoteria");

  if(fechaGuardada === hoy && !esAdmin()){
    document.getElementById("resCaja").innerHTML =
      "⚠️ Intento diario usado.<br>Resultado: 🔥 " + numeroGuardado + " — " + loteriaGuardada;
    bloquearCajas();
    return;
  }

  let n = Math.floor(Math.random() * 100).toString().padStart(2,"0");
  let loteria = loteriaAleatoria();

  if(esAdmin()){
    document.getElementById("resCaja").innerHTML =
      "👑 Admin<br>🔥 " + n + " — " + loteria + "<br>Intentos ilimitados";
    desbloquearCajas();
    return;
  }

  localStorage.setItem("cajaFecha", hoy);
  localStorage.setItem("cajaNumero", n);
  localStorage.setItem("cajaLoteria", loteria);

  document.getElementById("resCaja").innerHTML =
    "🔥 " + n + " — " + loteria;

  bloquearCajas();
}

function verificarCaja(){
  let hoy = fechaHoy();
  let fechaGuardada = localStorage.getItem("cajaFecha");
  let numeroGuardado = localStorage.getItem("cajaNumero");
  let loteriaGuardada = localStorage.getItem("cajaLoteria");

  if(esAdmin()){
    document.getElementById("resCaja").innerHTML =
      "👑 Admin activo: caja ilimitada";
    desbloquearCajas();
    return;
  }

  if(fechaGuardada === hoy){
    document.getElementById("resCaja").innerHTML =
      "⚠️ Intento diario usado.<br>Resultado: 🔥 " + numeroGuardado + " — " + loteriaGuardada;
    bloquearCajas();
  }
}

function bloquearCajas(){
  let cajas = document.querySelectorAll(".mystery-box");

  cajas.forEach(caja=>{
    caja.classList.add("bloqueadaCaja");
  });
}

function desbloquearCajas(){
  let cajas = document.querySelectorAll(".mystery-box");

  cajas.forEach(caja=>{
    caja.classList.remove("bloqueadaCaja");
  });
}

/* =========================
   TRIPLETA DIARIA
   VISITANTE: 1 INTENTO POR DÍA
   ADMIN: ILIMITADO
========================= */

function tripleta(){
  let hoy = fechaHoy();

  if(localStorage.getItem("tripFecha") === hoy && !esAdmin()){
    let tripletaGuardada = localStorage.getItem("tripletaResultado");

    document.getElementById("resTripleta").innerHTML =
      "⚠️ Ya usaste hoy<br>" + tripletaGuardada;

    return;
  }

  let a = Math.floor(Math.random() * 100).toString().padStart(2,"0");
  let b = Math.floor(Math.random() * 100).toString().padStart(2,"0");
  let c = Math.floor(Math.random() * 100).toString().padStart(2,"0");
  let loteria = loteriaAleatoria();

  let resultado = "";

  if(esAdmin()){
    resultado = `👑 Admin<br>🔥 ${a}-${b}-${c}<br>🎯 ${loteria}<br>Intentos ilimitados`;
  }else{
    resultado = `🔥 ${a}-${b}-${c}<br>🎯 ${loteria}`;

    localStorage.setItem("tripFecha", hoy);
    localStorage.setItem("tripletaResultado", resultado);
  }

  document.getElementById("resTripleta").innerHTML = resultado;
}

function verificarTripleta(){
  let hoy = fechaHoy();

  if(esAdmin()){
    document.getElementById("resTripleta").innerHTML =
      "👑 Admin activo: tripleta ilimitada";
    return;
  }

  if(localStorage.getItem("tripFecha") === hoy){
    let tripletaGuardada = localStorage.getItem("tripletaResultado");

    document.getElementById("resTripleta").innerHTML =
      "⚠️ Ya usaste hoy<br>" + tripletaGuardada;
  }
}

/* =========================
   SISTEMA EN VIVO
========================= */

let mensajes = [
  "🔥 Jugador ganó con 35",
  "📊 Sistema detectó patrón",
  "🎯 Nueva combinación activa",
  "⚡ Movimiento detectado",
  "💰 Premio entregado",
  "🧬 ADN Piramidal procesando",
  "🎲 Nueva lectura disponible"
];

setInterval(()=>{
  let m = mensajes[Math.floor(Math.random() * mensajes.length)];
  document.getElementById("live").innerHTML = m;
},3000);

</script>

</body>
</html>
