<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;color:white;text-align:center;padding-bottom:95px;background:radial-gradient(circle at top left,rgba(255,215,0,.18),transparent 28%),radial-gradient(circle at top right,rgba(0,255,180,.16),transparent 30%),linear-gradient(135deg,#05080d,#071923,#102f3d);overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.05),transparent);animation:shine 6s infinite linear;pointer-events:none}

header{padding:34px 16px 26px;border-bottom:2px solid gold;background:rgba(0,0,0,.35);box-shadow:0 0 35px rgba(255,215,0,.25)}

.subtitle{font-size:24px;margin-top:10px}
.top-info{max-width:1100px;margin:24px auto 0;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.info{background:rgba(0,0,0,.45);border:1px solid rgba(255,215,0,.7);border-radius:22px;padding:20px;font-size:23px;font-weight:bold}
#timer{color:#00ff99}
#app{max-width:1100px;margin:auto}
.card{background:rgba(255,255,255,.09);margin:18px;padding:24px;border-radius:24px;box-shadow:0 0 28px rgba(255,215,0,.18);backdrop-filter:blur(8px)}
.main-row{display:flex;justify-content:space-between;align-items:center;font-size:25px;font-weight:bold;gap:12px}
.links a{display:inline-block;margin:10px;padding:18px 28px;border-radius:18px;color:white;text-decoration:none;font-weight:bold;font-size:18px}
.vip{background:linear-gradient(135deg,#00ff88,#17b85c);box-shadow:0 0 28px rgba(0,255,136,.8);animation:pulse 1.2s infinite}
.canal{background:linear-gradient(135deg,#00b4d8,#0077b6)}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}
.pred-img{width:100%;max-width:780px;display:block;margin:auto;border-radius:22px;border:2px solid rgba(255,215,0,.65);box-shadow:0 0 45px rgba(0,0,0,.9)}
.status,.systems{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.status-box,.system{background:rgba(0,0,0,.42);border:1px solid gold;border-radius:20px;padding:22px;min-height:145px}
.status-box span,.emoji{font-size:44px;display:block;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.box{background:#050505;border:1px solid gold;border-radius:16px;padding:17px;font-size:21px;font-weight:bold}
.mystery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.mystery-box{background:linear-gradient(135deg,#111,#332600);border:2px solid gold;border-radius:22px;padding:28px;font-size:48px;cursor:pointer;box-shadow:0 0 25px rgba(255,215,0,.25);transition:.3s}
.mystery-box:hover{transform:scale(1.08)}
.resultado-misterio{margin-top:20px;font-size:24px;font-weight:bold;color:#00ff99}
#vipBox{display:none;background:#050505;border:1px solid gold;border-radius:22px;padding:26px;margin:20px auto;max-width:640px}
input{padding:14px;border:none;border-radius:14px;text-align:center;font-size:16px}
button{padding:14px 24px;border:none;border-radius:14px;background:gold;font-weight:bold;cursor:pointer}
.fijo{position:fixed;bottom:0;left:0;width:100%;background:rgba(0,0,0,.95);padding:14px 0;z-index:999;border-top:2px solid gold}
.fijo a{background:linear-gradient(135deg,#00ff88,#16b85d);color:white;text-decoration:none;font-weight:bold;padding:16px 36px;border-radius:18px;display:inline-block;animation:pulse 1.2s infinite}

@media(max-width:700px){
h1{font-size:36px}
.subtitle{font-size:19px}
.top-info,.status,.systems{grid-template-columns:1fr}
.info{font-size:18px}
.main-row{flex-direction:column;font-size:18px}
.grid,.mystery-grid{grid-template-columns:repeat(2,1fr)}
.links a{display:block;width:88%;margin:12px auto}
.card{margin:12px;padding:16px}
}
</style>
</head>
