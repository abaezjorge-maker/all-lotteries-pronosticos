<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominancia 88</title>

<style>
*{box-sizing:border-box}

/* 🔥 FONDO CASINO REAL */
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
padding-bottom:90px;

background:url("fondo.jpg.jpeg") no-repeat center center fixed;
background-size:cover;
}

/* 🔥 CAPA OSCURA ENCIMA (IMPORTANTE) */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* HEADER */
header{
padding:25px 15px;
}

h1{
color:gold;
font-size:38px;
text-shadow:0 0 20px gold;
}

/* CARDS TIPO GLASS */
.card{
background:rgba(0,0,0,0.55);
margin:12px;
padding:18px;
border-radius:18px;
border:1px solid rgba(255,215,0,0.3);
box-shadow:0 0 20px rgba(255,215,0,0.2);
backdrop-filter: blur(6px);
}

/* BOTONES */
.links a{
display:inline-block;
margin:8px;
padding:14px 20px;
border-radius:12px;
color:white;
text-decoration:none;
font-weight:bold;
border:1px solid gold;
box-shadow:0 0 10px rgba(255,215,0,.4);
}

.vip{background:linear-gradient(45deg,#00c853,#009624)}
.canal{background:#128C7E}
.instagram{background:#E1306C}
.facebook{background:#1877F2}

/* PRONÓSTICO BLOQUEADO */
.pred-wrap{position:relative;max-width:780px;margin:auto}
.pred-img{
width:100%;
border-radius:15px;
border:2px solid gold;
filter:blur(8px);
}
.pred-img.desbloqueada{filter:blur(0)}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
border-radius:15px;
}

.overlay.oculto{display:none}

/* RULETA */
.ruleta{
width:240px;
height:240px;
border-radius:50%;
border:5px solid gold;
margin:20px auto;
overflow:hidden;
box-shadow:0 0 40px gold;
}

.ruleta-inner{
width:100%;
height:100%;
border-radius:50%;
transition:transform 4s ease-out;
background:conic-gradient(
gold 0 45deg,
#111 45deg 90deg,
#00c853 90deg 135deg,
#111 135deg 180deg,
gold 180deg 225deg,
#111 225deg 270deg,
#E1306C 270deg 315deg,
#111 315deg 360deg
);
}

.pointer{font-size:30px}

.resultado{
margin-top:15px;
font-size:22px;
color:#00ff99;
font-weight:bold;
}

.numero{
font-size:50px;
color:gold;
}

/* CAJA */
.mystery-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.mystery-box{
background:linear-gradient(135deg,#111,#443300);
border:2px solid gold;
border-radius:18px;
padding:26px;
font-size:45px;
cursor:pointer;
box-shadow:0 0 15px gold;
}

/* VIP */
#vipBox{
display:none;
background:#000;
border:1px solid gold;
border-radius:20px;
padding:20px;
margin:15px auto;
max-width:600px;
}

input{
padding:12px;
border:none;
border-radius:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
cursor:pointer;
}

/* BOTÓN FIJO */
.fijo{
position:fixed;
bottom:0;
width:100%;
background:black;
padding:10px;
border-top:2px solid gold;
}

.fijo a{
background:#00c853;
padding:14px 25px;
border-radius:12px;
color:white;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>🔥 DOMINANCIA 88 🔥</h1>
<p>⚠️ SISTEMA ACTIVO HOY</p>
<p>🔥 CUPOS LIMITADOS AL VIP</p>
</header>

<!-- BOTONES -->
<div class="card">
<div class="links">
<a href="#" onclick="abrirVIP()" class="vip">🔥 ACCESO VIP 🔥</a>
<a href="https://whatsapp.com/channel/0029VbDEkXLFsn0nSeOzaN00" target="_blank" class="canal">📢 Canal Oficial</a>
<a href="#" class="instagram">Instagram</a>
<a href="#" class="facebook">Facebook</a>
</div>
</div>

<!-- VIP -->
<div id="vipBox">
<h3>🔒 Acceso VIP</h3>
<input type="password" id="clave" placeholder="Introduce clave">
<br><br>
<button onclick="verificar()">Entrar</button>
<div id="vipContent" style="display:none;margin-top:15px;">🔥 VIP DESBLOQUEADO</div>
</div>

<!-- PRONÓSTICO -->
<div class="card">
<h3>📊 Pronóstico VIP</h3>
<div class="pred-wrap">
<img id="pronostico" src="pronostico.jpg" class="pred-img">
<div id="bloqueo" class="overlay">
<h2>🔒 BLOQUEADO</h2>
<button onclick="abrirVIP()">Desbloquear</button>
</div>
</div>
</div>

<!-- RULETA -->
<div class="card">
<h3>🎡 Ruleta</h3>
<div class="pointer">🔻</div>
<div class="ruleta"><div id="ruleta" class="ruleta-inner"></div></div>
<button onclick="girarRuleta()">Girar</button>
<div id="resultadoRuleta" class="resultado"></div>
<div id="premioRuleta" class="resultado"></div>
</div>

<!-- CAJA -->
<div class="card">
<h3>🎁 Caja Misteriosa</h3>
<div class="mystery-grid">
<div class="mystery-box" onclick="abrirCaja()">🎁</div>
<div class="mystery-box" onclick="abrirCaja()">🎁</div>
<div class="mystery-box" onclick="abrirCaja()">🎁</div>
<div class="mystery-box" onclick="abrirCaja()">🎁</div>
</div>
<div id="resultadoCaja" class="resultado"></div>
</div>

<script>
function abrirVIP(){
document.getElementById("vipBox").style.display="block";
}

function verificar(){
if(document.getElementById("clave").value==="3321"){
document.getElementById("vipContent").style.display="block";
document.getElementById("pronostico").classList.add("desbloqueada");
document.getElementById("bloqueo").classList.add("oculto");
}else alert("Clave incorrecta");
}

function girarRuleta(){
let r=document.getElementById("ruleta");
let giro=360*7+Math.floor(Math.random()*360);
r.style.transform="rotate("+giro+"deg)";

setTimeout(()=>{
let gana=Math.floor(Math.random()*500)===0;
if(gana){
document.getElementById("resultadoRuleta").innerHTML="🔥 ACCESO PARCIAL";
document.getElementById("premioRuleta").innerHTML="👉 12 - 35";
}else{
document.getElementById("resultadoRuleta").innerHTML="🔒 Intenta mañana";
}
},4000);
}

function abrirCaja(){
let numero=Math.floor(Math.random()*100).toString().padStart(2,"0");
document.getElementById("resultadoCaja").innerHTML="🔥 "+numero;
}
</script>

<div class="fijo">
<a href="#" onclick="abrirVIP()">🔥 VIP FIJO 🔥</a>
</div>

</body>
</html>
