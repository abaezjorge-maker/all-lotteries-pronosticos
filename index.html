<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominancia 88</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:radial-gradient(circle at top,#233f4a,#071014 65%);
color:white;
text-align:center;
padding-bottom:90px;
}
header{
padding:34px 16px 24px;
border-bottom:2px solid gold;
background:linear-gradient(180deg,rgba(0,0,0,.45),rgba(0,0,0,.05));
}
h1{
margin:0;
font-size:56px;
color:gold;
letter-spacing:2px;
text-shadow:0 0 25px rgba(255,215,0,.9);
}
.subtitle{
font-size:23px;
margin-top:10px;
opacity:.95;
}
.top-info{
max-width:1050px;
margin:22px auto 0;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}
.info{
background:rgba(0,0,0,.45);
border:1px solid rgba(255,215,0,.55);
border-radius:20px;
padding:18px;
font-size:22px;
font-weight:bold;
box-shadow:0 0 20px rgba(255,215,0,.15);
}
#timer{color:#00ff88}
#app{max-width:1050px;margin:auto}
.card{
background:rgba(255,255,255,.09);
margin:18px;
padding:22px;
border-radius:22px;
box-shadow:0 0 25px rgba(255,215,0,.17);
backdrop-filter:blur(6px);
}
.main-row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:24px;
font-weight:bold;
gap:12px;
}
.links a{
display:inline-block;
margin:10px;
padding:17px 26px;
border-radius:16px;
color:white;
text-decoration:none;
font-weight:bold;
font-size:17px;
}
.vip{
background:#25D366;
box-shadow:0 0 22px rgba(37,211,102,.85);
animation:pulse 1.2s infinite;
}
.canal{background:#128C7E}
@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.07)}
100%{transform:scale(1)}
}
.pred-img{
width:100%;
max-width:760px;
display:block;
margin:auto;
border-radius:18px;
box-shadow:0 0 35px rgba(0,0,0,.8);
}
.systems{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
}
.system{
background:rgba(0,0,0,.42);
border:1px solid gold;
border-radius:18px;
padding:20px;
min-height:145px;
}
.emoji{
font-size:42px;
display:block;
margin-bottom:10px;
}
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}
.box{
background:#050505;
border:1px solid gold;
border-radius:14px;
padding:16px;
font-size:20px;
font-weight:bold;
}
#vipBox{
display:none;
background:#050505;
border:1px solid gold;
border-radius:20px;
padding:24px;
margin:20px auto;
max-width:620px;
}
input{
padding:13px;
border:none;
border-radius:12px;
text-align:center;
font-size:16px;
}
button{
padding:13px 22px;
border:none;
border-radius:12px;
background:gold;
font-weight:bold;
cursor:pointer;
}
.fijo{
position:fixed;
bottom:0;
left:0;
width:100%;
background:rgba(0,0,0,.94);
padding:13px 0;
z-index:999;
border-top:2px solid gold;
}
.fijo a{
background:#25D366;
color:white;
text-decoration:none;
font-weight:bold;
padding:15px 34px;
border-radius:16px;
display:inline-block;
animation:pulse 1.2s infinite;
}

@media(max-width:700px){
h1{font-size:36px}
.subtitle{font-size:19px}
.top-info{grid-template-columns:1fr}
.info{font-size:18px}
.main-row{flex-direction:column;font-size:18px}
.systems{grid-template-columns:1fr}
.grid{grid-template-columns:repeat(2,1fr)}
.links a{display:block;width:88%;margin:12px auto}
.card{margin:12px;padding:16px}
}
</style>
</head>

<body>

</html>
