<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominancia 88</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
padding-bottom:90px;
background:linear-gradient(135deg,#071923,#102f3d,#06141d);
}

header{
padding:25px 15px;
border-bottom:2px solid gold;
}

h1{
color:gold;
font-size:38px;
text-shadow:0 0 20px gold;
}

.impacto{
font-size:18px;
color:#00ff99;
margin-top:10px;
}

.card{
background:rgba(255,255,255,.08);
margin:12px;
padding:18px;
border-radius:18px;
}

.links a{
display:inline-block;
margin:8px;
padding:14px 20px;
border-radius:12px;
color:white;
text-decoration:none;
font-weight:bold;
}

.vip{background:#00c853}
.canal{background:#128C7E}
.instagram{background:#E1306C}
.facebook{background:#1877F2}

.pred-img{
width:100%;
max-width:750px;
border-radius:15px;
border:2px solid gold;
}

/* CAJA */
.mystery-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.mystery-box{
background:linear-gradient(135deg,#111,#443300);
border:2px solid gold;
border-radius:18px;
padding:26px;
font-size:45px;
cursor:pointer;
}

.resultado{
margin-top:15px;
font-size:22px;
color:#00ff99;
font-weight:bold;
}

.numero{
font-size:50px;
color:gold;
}

/* PRUEBA SOCIAL */
.stats{
color:gold;
font-weight:bold;
margin-top:10px;
}

/* NOTIFICACIÓN */
.toast{
position:fixed;
top:10px;
right:10px;
background:black;
border:1px solid gold;
padding:12px;
border-radius:12px;
display:none;
z-index:9999;
}

/* VIP */
#vipBox{
display:none;
background:#050505;
border:1px solid gold;
border-radius:20px;
padding:20px;
margin:15px auto;
max-width:600px;
}

input{
padding:12px;
border:none;
border-radius:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
}

/* FIJO */
.fijo{
position:fixed;
bottom:0;
width:100%;
background:black;
padding:10px;
border-top:2px solid gold;
}

.fijo a{
background:#00c853;
padding:14px 25px;
border-radius:12px;
color:white;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div id="toast" class="toast"></div>

<header>
<h1>🔥 DOMINANCIA 88 🔥</h1>

<div class="impacto">
⚠️ SISTEMA ACTIVO HOY<br>
🔥 CUPOS LIMITADOS AL VIP
</div>

<div class="stats">
🟢 <span id="usuarios">37</span> usuarios activos ahora
</div>
</header>

<!-- BOTONES -->
<div class="card">
<div class="links">
<a href="#" onclick="abrirVIP()" class="vip">🔥 ACCESO VIP 🔥</a>
<a href="https://whatsapp.com/channel/0029VbDEkXLFsn0nSeOzaN00" target="_blank" class="canal">📢 Canal Oficial</a>
<a href="#" class="instagram">Instagram</a>
<a href="#" class="facebook">Facebook</a>
</div>
</div>

<!-- VIP -->
<div id="vipBox">
<h3>🔒 Acceso VIP</h3>
<input type="password" id="clave" placeholder="Introduce clave">
<br><br>
<button onclick="verificar()">Entrar</button>

<div id="vipContent" style="display:none;margin-top:15px;">
🔥 CONTENIDO DESBLOQUEADO
</div>
</div>

<!-- PRONÓSTICO -->
<div class="card">
<h3>📊 Pronóstico del día</h3>
<img src="pronostico.jpg" class="pred-img">
</div>

<!-- CAJA -->
<div class="card">
<h3>🎁 Caja Misteriosa</h3>
<p>1 intento diario</p>

<div class="mystery-grid">
<div class="mystery-box" onclick="abrirCaja()">🎁</div>
<div class="mystery-box" onclick="abrirCaja()">🎁</div>
<div class="mystery-box" onclick="abrirCaja()">🎁</div>
<div class="mystery-box" onclick="abrirCaja()">🎁</div>
</div>

<div id="resultadoCaja" class="resultado"></div>
</div>

<script>
function abrirVIP(){
document.getElementById("vipBox").style.display="block";
}

function verificar(){
if(document.getElementById("clave").value==="3321"){
document.getElementById("vipContent").style.display="block";
}else{
alert("Clave incorrecta");
}
}

function abrirCaja(){
let hoy=new Date().toDateString();

if(localStorage.getItem("intento")==hoy){
document.getElementById("resultadoCaja").innerHTML="⚠️ Vuelve mañana";
return;
}

document.getElementById("resultadoCaja").innerHTML="⏳ Abriendo...";

setTimeout(()=>{

let numero=Math.floor(Math.random()*100).toString().padStart(2,"0");
let loterias=["Nacional","Leidsa","Real","Loteka"];
let loteria=loterias[Math.floor(Math.random()*loterias.length)];

document.getElementById("resultadoCaja").innerHTML=
`🔥 <span class="numero">${numero}</span><br>${loteria}`;

localStorage.setItem("intento",hoy);

},1200);
}

// MOVIMIENTO
function actividad(){
let u=Math.floor(Math.random()*20)+30;
document.getElementById("usuarios").innerText=u;

const mensajes=[
"🔥 Alguien entró al VIP",
"🎁 Nueva jugada generada",
"⚡ Sistema activo",
"💸 Usuario desbloqueó acceso"
];

let t=document.getElementById("toast");
t.innerText=mensajes[Math.floor(Math.random()*mensajes.length)];
t.style.display="block";

setTimeout(()=>{t.style.display="none"},3000);
}

setInterval(actividad,5000);
</script>

<div class="fijo">
<a href="#" onclick="abrirVIP()">🔥 VIP FIJO 🔥</a>
</div>

</body>
</html>
