<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominancia88</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;text-align:center;padding-bottom:90px}
header{padding:30px 15px;border-bottom:3px solid gold}
h1{margin:0;font-size:54px;color:gold;text-shadow:0 0 25px rgba(255,215,0,.9)}
.subtitle{font-size:24px;margin-top:10px}
.top-info{display:flex;justify-content:space-between;gap:12px;margin-top:20px}
.info-box{flex:1;background:rgba(0,0,0,.35);padding:18px;border-radius:18px;color:#ffcc00;font-size:24px;font-weight:bold}
#timer{color:#00ff88}
#app{max-width:1050px;margin:auto}
.card{background:rgba(255,255,255,.1);margin:18px;padding:20px;border-radius:18px;box-shadow:0 0 25px rgba(255,215,0,.2)}
.row-title{display:flex;justify-content:space-between;align-items:center;font-size:24px;font-weight:bold}
.pred-img{width:100%;max-width:760px;height:auto;margin:auto;display:block;border-radius:16px}
.links a{display:inline-block;margin:10px;padding:16px 24px;border-radius:14px;color:white;text-decoration:none;font-weight:bold}
.vip{background:#25D366;animation:latido 1.2s infinite}
.canal{background:#128C7E}
@keyframes latido{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.box{background:black;border:1px solid gold;padding:14px;border-radius:12px;font-weight:bold}
.systems{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.system-box{background:rgba(0,0,0,.35);border:1px solid gold;border-radius:16px;padding:18px;font-size:17px}
.emoji{font-size:34px;display:block;margin-bottom:8px}
#vipBox{display:none;background:black;padding:20px;border-radius:15px;margin:20px auto;max-width:600px}
input{padding:12px;border-radius:10px;border:none;text-align:center}
button{padding:12px 18px;border:none;border-radius:10px;background:gold;font-weight:bold}
.fijo{position:fixed;bottom:0;left:0;width:100%;background:rgba(0,0,0,.92);padding:12px 0;z-index:999;border-top:2px solid gold}
.fijo a{display:inline-block;background:#25D366;color:white;text-decoration:none;font-weight:bold;padding:14px 28px;border-radius:14px;animation:latido 1.2s infinite}

@media(max-width:600px){
h1{font-size:36px}
.subtitle{font-size:19px}
.top-info{flex-direction:column}
.info-box{font-size:18px}
.row-title{font-size:18px;flex-direction:column;gap:8px}
.card{margin:12px;padding:14px}
.links a{display:block;width:85%;margin:12px auto}
.systems{grid-template-columns:1fr}
.grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

</body>
</html>
