<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominancia 88</title>

<style>
body{margin:0;font-family:Arial;background:#06141d;color:white;text-align:center;padding-bottom:100px}
h1{color:gold;text-shadow:0 0 20px gold}

.card{background:rgba(255,255,255,.08);margin:15px;padding:20px;border-radius:20px}

.mystery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.mystery-box{
background:linear-gradient(135deg,#111,#332600);
border:2px solid gold;
border-radius:20px;
padding:30px;
font-size:50px;
cursor:pointer;
transition:.3s;
}
.mystery-box:hover{transform:scale(1.1)}

.abriendo{
animation:shake .5s;
}
@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(5deg)}
50%{transform:rotate(-5deg)}
75%{transform:rotate(5deg)}
100%{transform:rotate(0)}
}

.resultado{font-size:24px;margin-top:20px;color:#00ff99}

.historial{margin-top:15px;font-size:14px;opacity:.8}

.contador{font-size:20px;color:gold;margin-top:10px}
</style>
</head>

<body>

<h1>🔥 DOMINANCIA 88 🔥</h1>

<div class="card">
<h3>🎁 Caja Misteriosa</h3>
<p>1 intento diario — descubre tu jugada</p>

<div class="mystery-grid">
<div class="mystery-box" onclick="abrirCaja(this)">🎁</div>
<div class="mystery-box" onclick="abrirCaja(this)">🎁</div>
<div class="mystery-box" onclick="abrirCaja(this)">🎁</div>
</div>

<div id="resultado" class="resultado"></div>
<div class="contador" id="contadorGanadores"></div>
<div class="historial" id="historial"></div>

</div>

<script>
let intentoHoy=localStorage.getItem("intentoHoy");
let fechaHoy=new Date().toDateString();

if(intentoHoy===fechaHoy){
document.getElementById("resultado").innerText="⚠️ Ya usaste tu intento hoy";
}

function abrirCaja(elemento){

if(localStorage.getItem("intentoHoy")===fechaHoy){
return;
}

elemento.classList.add("abriendo");

setTimeout(()=>{

let tipo=Math.random();

const loterias=["Nacional","Leidsa","Real","Loteka","La Suerte"];
let numero=Math.floor(Math.random()*100).toString().padStart(2,"0");
let loteria=loterias[Math.floor(Math.random()*loterias.length)];

let resultadoTexto="";

if(tipo<0.6){
resultadoTexto=`🔥 Jugada: ${numero} (${loteria})`;
guardarHistorial(numero,loteria);
}else if(tipo<0.9){
resultadoTexto="😲 CASI GANAS ACCESO VIP...";
}else{
resultadoTexto="🔒 Acceso VIP oculto — desbloquéalo";
aumentarGanadores();
}

document.getElementById("resultado").innerHTML=resultadoTexto;

localStorage.setItem("intentoHoy",fechaHoy);

},600);
}

function aumentarGanadores(){
let total=localStorage.getItem("ganadores") || 120;
total++;
localStorage.setItem("ganadores",total);
mostrarGanadores();
}

function mostrarGanadores(){
let total=localStorage.getItem("ganadores") || 120;
document.getElementById("contadorGanadores").innerText="🔥 "+total+" usuarios desbloquearon VIP";
}

function guardarHistorial(numero,loteria){
let historial=JSON.parse(localStorage.getItem("historial")) || [];
historial.unshift(numero+" - "+loteria);
historial=historial.slice(0,5);
localStorage.setItem("historial",JSON.stringify(historial));
mostrarHistorial();
}

function mostrarHistorial(){
let historial=JSON.parse(localStorage.getItem("historial")) || [];
document.getElementById("historial").innerHTML=
"Últimas jugadas:<br>"+historial.join("<br>");
}

mostrarGanadores();
mostrarHistorial();
</script>

</body>
</html>
